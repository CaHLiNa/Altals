          - link "9 结论" [ref=e108] [cursor=pointer]:
            - /url: "#section.9"
          - text: 结论 7 1 汇报目标与最少记号 本文默认读者已经知道高斯分布、变分下界与基本神经网络训练，不再展开这些背景。 为避免记号混乱，全文采用 DDPM 社区更常见的一套记法： α t = 1 − β t , (1) ¯ α t = t ∏ s =1 α s , (2) q ( x t | x 0 ) = N ( √ ¯ α t x 0 , (1 − ¯ α t ) I ) . (3) 其中 x 0 是真实数据， x t 是第 t 步加噪后的变量， x T 接近标准高斯。需要特别说明的是： DDIM 原论文中很多地方把本文的 ¯ α t 直接记成 α t 。为了和多数中文资料保持一致，本文 仍使用 ¯ α t 写法。 2 DDPM ：问题出在什么地方 2.1 前向加噪与闭式采样 DDPM 的前向过程是固定的马尔可夫链： q ( x t | x t − 1 ) = N ( √ α t x t − 1 , β t I ) . (4) 把它连乘起来，可以得到任意时刻的闭式边缘分布 q ( x t | x 0 ) = N ( √ ¯ α t x 0 , (1 − ¯ α t ) I ) , (5) 因此可以直接写成重参数化形式 x t = √ ¯ α t x 0 + √ 1 − ¯ α t ϵ , ϵ ∼ N (0 , I ) . (6) 这一步很关键，因为后面 DDPM 和 DDIM 训练时都只会反复用到这个边缘分布，而不是 完整的联合分布。
