        - text: 从 DDPM 到 DDIM ：核心推导汇报 1 从 DDPM 到 DDIM ：核心推导汇报 基于中文讲解材料与原始论文整理 2026 年 3 月 6 日 摘要 本文按照“为什么 DDPM 采样慢”“ DDIM 究竟改了什么”“核心更新式如何推出来” 的顺序，对 DDIM 做一份偏推导型的汇报。按照要求，预备知识部分尽量压缩，只保留 最少记号。 全文重点强调两件事： 其一， DDIM 不是换了训练目标， 而是抓住了 DDPM 目标只依赖边缘分布 q ( x t | x 0 ) 的事实，从而把马尔可夫前向过程推广成一族非马尔可 夫过程；其二， DDIM 的采样式本质上是“预测干净样本 ˆ x 0 + 沿当前噪声方向推进 + 可选随机噪声”的三项分解，这正是它能在不重训模型的前提下显著减少采样步数的原 因。 目录 1
