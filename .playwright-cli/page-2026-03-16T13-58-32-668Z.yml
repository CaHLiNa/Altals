        - link "9 结论" [ref=e76] [cursor=pointer]:
          - /url: "#section.9"
        - text: 结论 7 1 汇报目标与最少记号 本文默认读者已经知道高斯分布、变分下界与基本神经网络训练，不再展开这些背景。 为避免记号混乱，全文采用 DDPM 社区更常见的一套记法： α t = 1 − β t , (1) ¯ α t = t ∏ s =1 α s , (2) q ( x t | x 0 ) = N ( √ ¯ α t x 0 , (1 − ¯ α t ) I ) . (3) 其中 x 0 是真实数据， x t 是第 t 步加噪后的变量， x T 接近标准高斯。需要特别说明的是： DDIM 原论文中很多地方把本文的 ¯ α t 直接记成 α t 。为了和多数中文资料保持一致，本文 仍使用 ¯ α t 写法。 2 DDPM ：问题出在什么地方 2.1 前向加噪与闭式采样 DDPM 的前向过程是固定的马尔可夫链： q ( x t | x t − 1 ) = N ( √ α t x t − 1 , β t I ) . (4) 把它连乘起来，可以得到任意时刻的闭式边缘分布 q ( x t | x 0 ) = N ( √ ¯ α t x 0 , (1 − ¯ α t ) I ) , (5) 因此可以直接写成重参数化形式 x t = √ ¯ α t x 0 + √ 1 − ¯ α t ϵ , ϵ ∼ N (0 , I ) . (6) 这一步很关键，因为后面 DDPM 和 DDIM 训练时都只会反复用到这个边缘分布，而不是 完整的联合分布。
    - region "Page ⁨3⁩" [ref=e83]:
      - generic [ref=e85]: 从 DDPM 到 DDIM ：核心推导汇报 3 2.2 反向去噪与 DDPM 采样瓶颈 DDPM 要学的是反向条件分布 p θ ( x t − 1 | x t ) 。在变分推导里，一个核心量是前向后验 q ( x t − 1 | x t , x 0 ) = N ( x t − 1 ; ˜ µ t ( x t , x 0 ) , ˜ β t I ) , (7) 其中 ˜ µ t ( x t , x 0 ) = √ ¯ α t − 1 β t 1 − ¯ α t x 0 + √ α t (1 − ¯ α t − 1 ) 1 − ¯ α t x t , (8) ˜ β t = 1 − ¯ α t − 1 1 − ¯ α t β t . (9) 因此 DDPM 的单步采样可以理解为：先根据网络预测出当前噪声或均值，再按高斯分布从 x t 采出 x t − 1 。 问题也恰恰出在这里。由于这个反向链是逐步执行的，若训练时用了 T = 1000 步，那 么采样时通常也要跑近似数量级的网络前向。于是： • 训练并不算特别难； • 但生成一张图要执行很多次 U-Net ； • 这使 DDPM 的主要成本集中在 采样阶段 ，而不是训练阶段。 因此，从 DDPM 过渡到 DDIM 的真正动机，不是“把目标函数换掉”，而是“在不破坏训练 目标的前提下，重新定义一条更高效的生成路径”。 3 从 DDPM 到 DDIM ：关键观察 3.1 核心观察：训练目标只依赖边缘，不依赖完整联合 DDIM 论文最重要的一步，不是直接改采样公式，而是先重新审视 DDPM 的训练目 标。 DDPM 可以写成噪声预测目标 L simple = E t, x 0 , ϵ [ ∥ ∥ ϵ − ϵ θ ( √ ¯ α t x 0 + √ 1 − ¯ α t ϵ , t )∥ ∥ 2 2 ] . (10) 注意这里出现的随机变量构造只依赖于 q ( x t | x 0 ) ，也就是 x t = √ ¯ α t x 0 + √ 1 − ¯ α t ϵ . 它并没有直接要求前向过程必须是某个固定的马尔可夫链。 只要新的前向过程仍然满足相 同的边缘分布 q ( x t | x 0 ) ，那么训练时看到的噪声预测问题就不变。
