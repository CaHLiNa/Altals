<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Altals PDF Host</title>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search)
        const resolvedTheme = params.get('resolvedTheme') === 'light' ? 'light' : 'dark'
        const bootBackground = params.get('bootBackground') || (resolvedTheme === 'light' ? '#f5f3ee' : '#141311')
        const bootForeground = params.get('bootForeground') || (resolvedTheme === 'light' ? '#1b1a17' : '#f5f3ee')
        const root = document.documentElement

        root.style.colorScheme = resolvedTheme
        root.style.setProperty('--altals-pdf-host-boot-bg', bootBackground)
        root.style.setProperty('--altals-pdf-host-boot-fg', bootForeground)
      })()
    </script>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      html,
      body {
        overflow: hidden;
        background: var(--altals-pdf-host-boot-bg, #141311);
        color: var(--altals-pdf-host-boot-fg, #f5f3ee);
        color-scheme: inherit;
        cursor: text;
      }

      #app {
        background: inherit;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/pdf-host/main.js"></script>
  </body>
</html>
